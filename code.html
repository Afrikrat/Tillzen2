    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useContext, createContext } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        // --- Global State ---
        const GlobalStateContext = createContext();

        // --- Persistence Layer (IndexedDB) ---
        const DB_NAME = "GhanaRetailDB";
        const DB_VERSION = 1;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("products")) db.createObjectStore("products", { keyPath: "id" });
                    if (!db.objectStoreNames.contains("customers")) db.createObjectStore("customers", { keyPath: "id" });
                    if (!db.objectStoreNames.contains("sales")) db.createObjectStore("sales", { keyPath: "id", autoIncrement: true });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(request.error);
            });
        };

        const dbOp = async (storeName, mode, callback) => {
            const db = await initDB();
            const tx = db.transaction(storeName, mode);
            const store = tx.objectStore(storeName);
            return new Promise((resolve, reject) => {
                const request = callback(store);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const DataService = {
            getAll: (store) => dbOp(store, "readonly", (s) => s.getAll()),
            save: (store, data) => dbOp(store, "readwrite", (s) => s.put(data)),
            bulkSave: async (store, items) => {
                const db = await initDB();
                const tx = db.transaction(store, "readwrite");
                const s = tx.objectStore(store);
                items.forEach(item => s.put(item));
                return new Promise((resolve) => { tx.oncomplete = () => resolve(); });
            }
        };

        const GlobalStateProvider = ({ children }) => {
            const [products, setProducts] = useState([

                { id: 2, name: "Wireless Mouse M3", sku: "MS-4401-X", price: 45.00, stock: 24, status: "In Stock", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuD9e4mP-0T8w8v9f9r7z_w5l8-OqX5_z-N5l7f8w8v9f9r7z_w5l8-OqX5_z" },
                { id: 3, name: "Mechanical Keyboard K5", sku: "KB-1102-A", price: 89.00, stock: 12, status: "In Stock", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCHr-mP-0T8w8v9f9r7z_w5l8-OqX5_z-N5l7f8w8v9f9r7z_w5l8-OqX5_z" }
            ]);

            const [customers, setCustomers] = useState([
                { id: 1, name: "Auntie Mary", phone: "024 111 2222", visits: 45, owed: 150.00, initial: "M", color: "bg-pink-50 text-pink-600 border-pink-100" },
                { id: 2, name: "Kofi Owusu", phone: "055 444 3333", visits: 12, owed: 0, initial: "K", color: "bg-blue-50 text-blue-600 border-blue-100" },
                { id: 3, name: "Sister Ama", phone: "027 888 9999", visits: 8, owed: 45.00, initial: "A", color: "bg-emerald-50 text-emerald-600 border-emerald-100" }
            ]);

            const [cart, setCart] = useState([]);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [authToken, setAuthToken] = useState(localStorage.getItem('ghana_retail_token'));
            const [currentUser, setCurrentUser] = useState(JSON.parse(localStorage.getItem('ghana_retail_user') || 'null'));

            useEffect(() => {
                const handleStatus = () => setIsOnline(navigator.onLine);
                window.addEventListener('online', handleStatus);
                window.addEventListener('offline', handleStatus);
                
                const loadData = async () => {
                   try {
                       const localProducts = await DataService.getAll("products");
                       if (localProducts.length > 0) setProducts(localProducts);
                       else await DataService.bulkSave("products", products);

                       const localCustomers = await DataService.getAll("customers");
                       if (localCustomers.length > 0) setCustomers(localCustomers);
                       else await DataService.bulkSave("customers", customers);
                   } catch (err) {
                       console.error("Failed to load local data:", err);
                   }
                };
                loadData();

                return () => {
                    window.removeEventListener('online', handleStatus);
                    window.removeEventListener('offline', handleStatus);
                };
            }, []);

            // Persistence triggers
            useEffect(() => {
                if (products.length > 0) DataService.bulkSave("products", products);
            }, [products]);

            useEffect(() => {
                if (customers.length > 0) DataService.bulkSave("customers", customers);
            }, [customers]);

            const [isSyncing, setIsSyncing] = useState(false);

            const performSync = async () => {
                if (!isOnline || isSyncing || !authToken) return;
                setIsSyncing(true);
                try {
                    const allSales = await DataService.getAll("sales");
                    const unsyncedSales = allSales.filter(s => !s.synced);
                    
                    if (unsyncedSales.length > 0) {
                        const response = await fetch('api/sync.php', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${authToken}` 
                            },
                            body: JSON.stringify({ sales: unsyncedSales })
                        });
                        const result = await response.json();
                        if (result.success) {
                            for (const sale of unsyncedSales) {
                                await DataService.save("sales", { ...sale, synced: true });
                            }
                            console.log("Sync successful");
                        }
                    }
                } catch (err) {
                    console.error("Sync failed:", err);
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => {
                if (isOnline) performSync();
            }, [isOnline]);

            const addToCart = (product, qty = 1) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + qty } : item);
                    }
                    return [...prev, { ...product, qty }];
                });
            };

            const removeFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.id !== productId));
            };

            const updateCartQty = (productId, qty) => {
                if (qty < 1) {
                    removeFromCart(productId);
                    return;
                }
                setCart(prev => prev.map(item => item.id === productId ? { ...item, qty } : item));
            };

            const clearCart = () => setCart([]);

            const recordSale = async (saleData) => {
                const saleRecord = {
                    ...saleData,
                    timestamp: new Date().toISOString(),
                    synced: false
                };
                await DataService.save("sales", saleRecord);
                if (isOnline) performSync();
            };

            const logout = () => {
                localStorage.removeItem('ghana_retail_token');
                localStorage.removeItem('ghana_retail_user');
                setAuthToken(null);
                setCurrentUser(null);
            };

            return (
                <GlobalStateContext.Provider value={{
                    products, setProducts,
                    customers, setCustomers,
                    cart, setCart,
                    isOnline,
                    authToken, setAuthToken,
                    currentUser, setCurrentUser,
                    logout,
                    addToCart, removeFromCart, updateCartQty, clearCart, recordSale
                }}>
                    {children}
                </GlobalStateContext.Provider>
            );
        };
