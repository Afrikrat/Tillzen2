workflows:
  flutter-android:
    name: Flutter Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.22.3
      groups:
        - firebase_credentials # Create this group in Codemagic to store GOOGLE_SERVICES_JSON
      vars:
        PACKAGE_NAME: "com.tillzen.tillzen" 
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Set up Firebase (optional)
        script: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON not found, skipping Firebase setup"
          else
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          fi
      - name: Get dependencies
        script: |
          flutter packages pub get
      - name: Build Runner (Drift)
        script: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: |
          flutter build apk --debug --build-name=1.0.0 --build-number=$(($BUILD_NUMBER + 100))
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - afrikrat@gmail.com
        notify:
          success: true
          failure: true
